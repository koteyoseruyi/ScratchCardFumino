# 全局定价倍率（不能小于1，默认为500）
# 卡的实际价格 = price × multiplier
# 实际发放奖金 = reward × multiplier
multiplier: 500

cards:
  # ===== 铜刮刮卡（铜卡配置：3槽，无加成） =====
  bronze:
    display: "<gradient:#CD7F32:#FFD700>铜刮刮卡</gradient>"
    lore:
      - "<gray>右键打开，有3次刮奖机会"
    slot-count: 3
    price: 1.0
    bonus-enabled: false
    rewards:
      EMPTY:   { weight: 35, reward: 0.0 }
      SMALL:   { weight: 40, reward: 0.3 }
      MEDIUM:  { weight: 18, reward: 0.6 }
      LARGE:   { weight: 7,  reward: 1.8 }

  # ===== 金刮刮卡（银卡配置：5槽，同类型加成） =====
  gold:
    display: "<gradient:#FFD700:#FFA500>金刮刮卡</gradient>"
    lore:
      - "<gray>右键打开，有5次刮奖机会"
    slot-count: 5
    price: 5.0
    bonus-enabled: true
    rewards:
      EMPTY:   { weight: 30, reward: 0.0 }
      SMALL:   { weight: 30, reward: 0.6 }
      MEDIUM:  { weight: 20, reward: 1.0 }
      LARGE:   { weight: 15, reward: 2.5 }
      HUGE:    { weight: 5,  reward: 7.0 }

  # ===== 钻石刮刮卡（金卡配置：5奖励槽+3倍率槽，同类型加成+倍率乘积） =====
  diamond:
    display: "<gradient:#00FFFF:#0080FF>钻石刮刮卡</gradient>"
    lore:
      - "<gray>右键打开，有8次刮奖机会"
    slot-count: 8
    price: 20.0
    bonus-enabled: true
    reward-slots: 5
    multiplier-slots: 3
    rewards:
      EMPTY:   { weight: 30, reward: 0.0 }
      SMALL:   { weight: 30, reward: 0.6 }
      MEDIUM:  { weight: 20, reward: 1.0 }
      LARGE:   { weight: 15, reward: 2.5 }
      HUGE:    { weight: 5,  reward: 7.0 }
    multipliers:
      "1": { weight: 55 }
      "2": { weight: 35 }
      "3": { weight: 7 }
      "4": { weight: 2.2 }
      "5": { weight: 0.8 }
